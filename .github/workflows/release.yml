name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            archive: zip
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
            archive: tar
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "ver=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ver=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X github.com/ivantit66/onebase/internal/version.Build=${{ steps.ver.outputs.ver }}" -o onebase${{ matrix.ext }} ./cmd/onebase

      - name: Build GUI binary (Windows native window, webview)
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          CGO_ENABLED: 1
        run: |
          go build -tags webview -ldflags="-s -w -H windowsgui -X github.com/ivantit66/onebase/internal/version.Build=${{ steps.ver.outputs.ver }}" -o onebase-gui.exe ./cmd/onebase

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $name = "onebase-${{ matrix.goos }}-${{ matrix.goarch }}"
          New-Item -ItemType Directory -Name $name
          Copy-Item onebase.exe "$name\"
          Copy-Item onebase-gui.exe "$name\"
          Copy-Item README.md "$name\" -ErrorAction SilentlyContinue
          Copy-Item examples "$name\" -Recurse -ErrorAction SilentlyContinue
          Compress-Archive -Path "$name\*" -DestinationPath "${name}.zip"
          echo "ASSET=${name}.zip" >> $env:GITHUB_ENV

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          name="onebase-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir "$name"
          cp onebase "$name/"
          cp README.md "$name/" 2>/dev/null || true
          cp -r examples "$name/" 2>/dev/null || true
          tar czf "${name}.tar.gz" "$name"
          echo "ASSET=${name}.tar.gz" >> $GITHUB_ENV

      - name: Checksum (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 $env:ASSET).Hash.ToLower()
          "$hash  $env:ASSET" | Out-File -Encoding ascii "$env:ASSET.sha256"

      - name: Checksum (Unix)
        if: matrix.goos != 'windows'
        run: sha256sum "$ASSET" > "$ASSET.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: onebase-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          retention-days: 7

  dev-release:
    name: Dev Pre-Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      # checkout нужен чтобы `git log` дал subject последнего коммита для
      # <!-- summary --> маркера. Сайт onabase.site берёт текст из этого
      # маркера для карточки релиза — без него попадает дефолтный «Автосборка…».
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute commit subject
        id: subj
        # heredoc-форма GH_OUTPUT — корректно переживает спецсимволы
        # (кавычки, обратные апострофы, эмодзи) в subject коммита.
        run: |
          {
            echo "subject<<EOF"
            git log -1 --format=%s
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: build-${{ github.run_number }}
          prerelease: true
          files: dist/*
          body: |
            <!-- summary: ${{ steps.subj.outputs.subject }} -->

            ## Что нового

            ${{ steps.subj.outputs.subject }}

            ## Сборка

            Автосборка из ветки `main`.
            Коммит: `${{ github.sha }}`
            Версия платформы: `build-${{ github.run_number }}`

            Для идентификации: в конфигураторе в шапке отображается `платформа build-${{ github.run_number }}`.

      - name: Append commit diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          # Find the previous build release
          PREV=$(gh release list --repo "${{ github.repository }}" --limit 50 --json tagName --jq '.[].tagName' \
            | grep '^build-' \
            | sed 's/build-//' \
            | sort -n \
            | awk -v cur="${{ github.run_number }}" '$1 < cur' \
            | tail -1)

          SUMMARY=""
          CHANGES=""

          if [[ -n "$PREV" ]]; then
            PREV_TAG="build-${PREV}"
            COMMITS=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" \
              --jq '.commits[] | "- \(.commit.message | split("\n")[0]) (\(.sha[0:7]))"' 2>/dev/null || true)

            if [[ -n "$COMMITS" ]]; then
              COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')
              CHANGES=$'\n\n'"## Изменения с ${PREV_TAG} (${COUNT} коммит(ов))"$'\n'"${COMMITS}"

              # Generate summary from first commit message (one line, stripped of conventional prefix)
              FIRST=$(echo "$COMMITS" | head -1 | sed 's/([^)]*)$//' | sed 's/^[- ]*//' | sed 's/<!--//g; s/-->//g')
              SUMMARY="<!-- summary: ${FIRST} -->"$'\n\n'
            fi
          fi

          # Read current body, prepend summary marker, append changes
          CURRENT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')
          NEW_BODY="${SUMMARY}${CURRENT}${CHANGES}"

          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "$NEW_BODY"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release body
        id: release_body
        shell: bash
        run: |
          notes="release_${GITHUB_REF_NAME}.md"
          if [[ -f "$notes" ]]; then
            echo "path=$notes" >> "$GITHUB_OUTPUT"
          else
            cat > release-default.md <<'EOF'
          <!-- summary: Обновление OneBase с бинарными сборками для Windows, Linux и macOS. -->

          ## Что нового

          См. автоматически сгенерированный список изменений ниже.

          ## Установка

          ### Windows
          1. Скачайте `onebase-windows-amd64.zip`
          2. Распакуйте в любую папку, например `C:\onebase\`
          3. Запустите `onebase-gui.exe`

          ### Linux / macOS
          ```bash
          tar xzf onebase-linux-amd64.tar.gz
          ./onebase-linux-amd64/onebase start
          ```

          ### Требования
          - PostgreSQL 14+ нужен только для многопользовательского режима
          - Для SQLite-режима дополнительных зависимостей нет
          EOF
            echo "path=release-default.md" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: ${{ steps.release_body.outputs.path }}
