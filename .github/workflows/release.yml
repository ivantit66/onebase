name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            archive: zip
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
            archive: tar
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "ver=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ver=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X github.com/ivantit66/onebase/internal/version.Build=${{ steps.ver.outputs.ver }}" -o onebase${{ matrix.ext }} ./cmd/onebase

      - name: Build GUI binary (Windows native window, webview)
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          CGO_ENABLED: 1
        run: |
          go get github.com/webview/webview_go@latest
          go build -tags webview -ldflags="-s -w -H windowsgui -X github.com/ivantit66/onebase/internal/version.Build=${{ steps.ver.outputs.ver }}" -o onebase-gui.exe ./cmd/onebase

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $name = "onebase-${{ matrix.goos }}-${{ matrix.goarch }}"
          New-Item -ItemType Directory -Name $name
          Copy-Item onebase.exe "$name\"
          Copy-Item onebase-gui.exe "$name\"
          Copy-Item README.md "$name\" -ErrorAction SilentlyContinue
          Copy-Item examples "$name\" -Recurse -ErrorAction SilentlyContinue
          Compress-Archive -Path "$name\*" -DestinationPath "${name}.zip"
          echo "ASSET=${name}.zip" >> $env:GITHUB_ENV

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          name="onebase-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir "$name"
          cp onebase "$name/"
          cp README.md "$name/" 2>/dev/null || true
          cp -r examples "$name/" 2>/dev/null || true
          tar czf "${name}.tar.gz" "$name"
          echo "ASSET=${name}.tar.gz" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: onebase-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          retention-days: 7

  dev-release:
    name: Dev Pre-Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: build-${{ github.run_number }}
          prerelease: true
          files: dist/*
          body: |
            Автосборка из ветки `main`.
            Коммит: `${{ github.sha }}`
            Версия платформы: `build-${{ github.run_number }}`

            Для идентификации: в конфигураторе в шапке отображается `платформа build-${{ github.run_number }}`.

      - name: Append commit diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          # Find the previous build release
          PREV=$(gh release list --repo "${{ github.repository }}" --limit 50 --json tagName --jq '.[].tagName' \
            | grep '^build-' \
            | sed 's/build-//' \
            | sort -n \
            | awk -v cur="${{ github.run_number }}" '$1 < cur' \
            | tail -1)

          if [[ -z "$PREV" ]]; then
            echo "No previous build found, skipping commit diff."
            exit 0
          fi

          PREV_TAG="build-${PREV}"
          COMMITS=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" \
            --jq '.commits[] | "- \(.commit.message | split("\n")[0]) (\(.sha[0:7]))"' 2>/dev/null || true)

          if [[ -z "$COMMITS" ]]; then
            echo "No commits found between ${PREV_TAG} and ${TAG}."
            exit 0
          fi

          COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')
          CHANGES=$'\n\n'"## Изменения с ${PREV_TAG} (${COUNT} коммит(ов))"$'\n'"${COMMITS}"

          # Read current body and append
          CURRENT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')
          NEW_BODY="${CURRENT}${CHANGES}"

          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "$NEW_BODY"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Установка

            ### Windows
            1. Скачайте `onebase-windows-amd64.zip`
            2. Распакуйте в любую папку (например `C:\onebase\`)
            3. Двойной клик на **`onebase-gui.exe`** — откроется лаунчер в браузере
            4. Или из терминала: `onebase start`

            ### Linux / macOS
            ```bash
            tar xzf onebase-linux-amd64.tar.gz
            sudo mv onebase-linux-amd64/onebase /usr/local/bin/
            onebase start
            ```

            ### Требования
            - PostgreSQL 14+ (локальный или сетевой)
            - Современный браузер (Chrome, Edge, Firefox)
