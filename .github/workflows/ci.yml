name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Check for UTF-8 BOM in .go files
        run: |
          if grep -rlI $'\xEF\xBB\xBF' --include='*.go' .; then
            echo "::error::Найдены .go файлы с UTF-8 BOM (перечислены выше). Уберите BOM — это ломает //go:build строки и засоряет diff."
            exit 1
          fi
          echo "BOM не найден — ок."

      # Полнота переводов шаблонов: тот же tools/i18ncheck, что в pre-commit
      # hook. В CI ловит непереведённые {{t}}-ключи до мержа — pre-commit
      # срабатывает только локально и обходится --no-verify (план 64: 19 ключей
      # редактора макетов просочились в main). Быстрый шаг — до тяжёлых тестов.
      - name: i18n translations check
        run: go run ./tools/i18ncheck

      - name: Lint shipped example/template configurations
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          go build -o "$tmp/onebase" ./cmd/onebase

          failed=0
          for project in examples/* templates/*; do
            [ -d "$project" ] || continue
            echo "::group::$project"
            out="$("$tmp/onebase" lint --project "$project" --json)"
            issues="$(printf '%s' "$out" | jq '(.issues // []) | length')"
            warnings="$(printf '%s' "$out" | jq '(.warnings // []) | length')"
            if [ "$issues" -ne 0 ] || [ "$warnings" -ne 0 ]; then
              echo "::error::$project has $issues issue(s) and $warnings warning(s)"
              printf '%s' "$out" | jq -r '
                (.issues // []), (.warnings // [])
                | .[]
                | "\(.file // "(конфигурация)"):\(.line // 0):\(.column // 0): [\(.kind // "")] [\(.code // "")] \(.message)"
              '
              failed=1
            else
              echo "$project: lint clean"
            fi
            echo "::endgroup::"
          done
          exit "$failed"

      - name: go vet
        run: go vet ./...

      # -race на Linux работает без CGo-плясок (на Windows нужен gcc) и ловит
      # гонки разделяемого интерпретатора и других синглтонов (план 52/56).
      # Coverage собирается тем же прогоном, чтобы не гонять тесты дважды.
      - name: Unit tests (-race, coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -5

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Build (check compile)
        env:
          CGO_ENABLED: 0
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true
      # Набор линтеров — в .golangci.yml (план 56): стартуем с того, что
      # проходит сейчас, ужесточаем по мере чистки.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: onebase
          POSTGRES_PASSWORD: onebase
          POSTGRES_DB: onebase_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onebase -d onebase_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://onebase:onebase@127.0.0.1:5432/onebase_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true
      - name: PostgreSQL integration tests
        run: |
          go test -tags integration ./internal/storage
          go test -tags integration ./internal/configdb

  vuln:
    # Сканирование известных уязвимостей в зависимостях и stdlib. govulncheck
    # анализирует только достижимый код (call graph), поэтому шумит меньше, чем
    # аудит всего go.sum: падает лишь когда уязвимая функция реально вызывается.
    # Важно для платформы с сетевым egress (HTTP-клиент, email, LLM,
    # ВыполнитьКоманду) — ловит уязвимые транзитивные зависимости и версию Go до
    # релиза. На момент добавления достижимых advisory нет: модульные закрыты
    # бампом (x/net, pgx/v5), stdlib — патчами в go-version toolchain'а ниже.
    # Держите go-version актуальным и пиньте патч-версию: floating 1.26.x может
    # взять устаревший toolcache на GitHub runner и завалить govulncheck.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  bench:
    # Контроль регрессий производительности: гоняем микробенчмарки горячих путей
    # (DSL-интерпретатор, storage CRUD, проведение документа) на PR и сравниваем
    # с базой через benchstat. Все бенчи работают на SQLite в tempdir — внешних
    # сервисов не нужно. Только для pull_request (нужна база для сравнения).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260709024250-82a0b07e230d

      - name: Benchmark (PR)
        run: |
          go test -run NONE -bench . -benchmem -count 6 \
            ./internal/dsl/interpreter/ ./internal/storage/ ./internal/entityservice/ \
            | tee bench-pr.txt

      - name: Benchmark (base)
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          # На базе бенч-функций может не быть — тогда файл пустой, benchstat
          # просто покажет только числа PR. Не валим джоб из-за этого.
          go test -run NONE -bench . -benchmem -count 6 \
            ./internal/dsl/interpreter/ ./internal/storage/ ./internal/entityservice/ \
            | tee bench-base.txt || true
          git checkout -

      - name: Compare (benchstat)
        run: benchstat bench-base.txt bench-pr.txt | tee benchstat.txt

      - name: Upload benchstat report
        uses: actions/upload-artifact@v4
        with:
          name: benchstat
          path: benchstat.txt
