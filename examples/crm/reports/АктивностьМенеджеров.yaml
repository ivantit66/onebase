name: АктивностьМенеджеров
title: Активность менеджеров
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
  - name: Ответственный
    type: reference:Сотрудник
    label: Ответственный
query: |
  ВЫБРАТЬ
    Ответственный,
    КОЛИЧЕСТВО(*) КАК КоличествоВзаимодействий,
    СУММА(ДлительностьМинут) КАК ОбщаяДлительностьМин
  ИЗ РегистрНакопления.Взаимодействия
  ГДЕ (&Начало ЕСТЬ ПУСТО ИЛИ period >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ period <= &Конец)
    И (&Ответственный ЕСТЬ ПУСТО ИЛИ Ответственный = &Ответственный)
  СГРУППИРОВАТЬ ПО Ответственный
  УПОРЯДОЧИТЬ ПО КоличествоВзаимодействий УБЫВ
