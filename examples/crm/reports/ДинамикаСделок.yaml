name: ДинамикаСделок
title: Динамика сделок
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    Дата,
    КОЛИЧЕСТВО(*) КАК КоличествоСделок,
    СУММА(Сумма) КАК СуммаСделок
  ИЗ Документ.Сделка
  ГДЕ (&Начало ЕСТЬ ПУСТО ИЛИ Дата >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ Дата <= &Конец)
  СГРУППИРОВАТЬ ПО Дата
  УПОРЯДОЧИТЬ ПО Дата
