name: СделкиПоИсточникам
title: Сделки по источникам
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    Источник,
    КОЛИЧЕСТВО(*) КАК КоличествоСделок,
    СУММА(Сумма) КАК СуммаСделок
  ИЗ Документ.Сделка
  ГДЕ (&Начало ЕСТЬ ПУСТО ИЛИ Дата >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ Дата <= &Конец)
  СГРУППИРОВАТЬ ПО Источник
  УПОРЯДОЧИТЬ ПО КоличествоСделок УБЫВ
