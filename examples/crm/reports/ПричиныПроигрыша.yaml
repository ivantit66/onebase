name: ПричиныПроигрыша
title: Причины проигрыша сделок
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    ПричинаПроигрыша,
    КОЛИЧЕСТВО(*) КАК КоличествоСделок,
    СУММА(Сумма) КАК ПотеряннаяСумма
  ИЗ Документ.Сделка
  ГДЕ Результат = 'Проиграна'
    И (&Начало ЕСТЬ ПУСТО ИЛИ Дата >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ Дата <= &Конец)
  СГРУППИРОВАТЬ ПО ПричинаПроигрыша
  УПОРЯДОЧИТЬ ПО КоличествоСделок УБЫВ
