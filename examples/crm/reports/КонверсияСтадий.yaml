name: КонверсияСтадий
title: Конверсия по стадиям
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    Стадия,
    КОЛИЧЕСТВО(*) КАК КоличествоСделок,
    СУММА(Сумма) КАК СуммаСделок
  ИЗ РегистрНакопления.ВоронкаПродаж
  ГДЕ (&Начало ЕСТЬ ПУСТО ИЛИ period >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ period <= &Конец)
  СГРУППИРОВАТЬ ПО Стадия
  УПОРЯДОЧИТЬ ПО КоличествоСделок УБЫВ
