name: ОтчётЗаМесяц
document: general
columns:
    - {}
    - {}
    - {}
areas:
    - name: Заголовок
      rows:
        - cells:
            - text: Финансовый отчёт за {{Месяц}}
              bold: true
              align: center
              fontSize: 14
              colspan: 3
    - name: Шапка
      rows:
        - cells:
            - text: Общие показатели
              bold: true
              fontSize: 14
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 'Доходы: {{Доходы | number:2}} руб.'
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 'Расходы: {{Расходы | number:2}} руб.'
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 'Баланс: {{Баланс | number:2}} руб.'
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 'Процент накоплений: {{ПроцентНакоплений}}%'
              colspan: 3
        - cells:
            - colspan: 3
    - name: ШапкаТаблицы
      rows:
        - cells:
            - text: Категория
              bold: true
              border: all
            - text: Сумма
              bold: true
              align: right
              border: all
            - text: '%'
              bold: true
              align: right
              border: all
    - name: Строка
      rows:
        - cells:
            - parameter: Кол0
              border: all
            - parameter: Кол1
              align: right
              border: all
            - parameter: Кол2
              align: right
              border: all
    - name: Итоги
      rows:
        - cells:
            - border: all
            - text: 'Итого: {{Итог.РасходыПоКатегориям.Сумма | number:2}}'
              bold: true
              align: right
              border: all
            - border: all
    - name: Подвал
      rows:
        - cells:
            - colspan: 3
              borders:
                bottom: thin
        - cells:
            - colspan: 3
        - cells:
            - text: '### Доходы по категориям'
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: '{{ДоходыПоКатегориям}}'
              colspan: 3
        - cells:
            - colspan: 3
binding:
    sequence:
        - Заголовок
        - Шапка
        - ШапкаТаблицы
        - Строка
        - Итоги
        - Подвал
    repeat:
        - area: Строка
          source: РасходыПоКатегориям
          parameters:
            Кол0: КатегорияРасхода
            Кол1: Сумма | number:2
            Кол2: Процент
