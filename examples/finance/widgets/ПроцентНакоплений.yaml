name: ПроцентНакоплений
type: kpi
title: Норма накоплений (%)
format: number
params:
  Начало: "{{today|start_of_month}}"
query: |
  ВЫБРАТЬ
    CASE
      WHEN СУММА(CASE WHEN ТипОперации = 'Приход' THEN Сумма ELSE 0 END) > 0
      THEN CAST((
        СУММА(CASE WHEN ТипОперации = 'Приход' THEN Сумма ELSE 0 END) -
        СУММА(CASE WHEN ТипОперации = 'Расход' THEN Сумма ELSE 0 END)
      ) * 100.0 / СУММА(CASE WHEN ТипОперации = 'Приход' THEN Сумма ELSE 0 END) AS INTEGER)
      ELSE 0
    END КАК Значение
  ИЗ РегистрНакопления.ДвижениеСредств
  ГДЕ period >= &Начало
