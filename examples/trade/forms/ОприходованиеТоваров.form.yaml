schema: onebase.form/v1
form:
  name: ФормаОбъекта
  kind: object
  entity: ОприходованиеТоваров
  title:
    ru: "Оприходование товаров"
    en: "Stock adjustment"
  auto_save_settings: true
attributes:
  - name: Объект
    type: DocumentRef.ОприходованиеТоваров
    save: true
    main: true
elements:
  - kind: ГруппаФормы
    name: ГруппаШапка
    title:
      ru: "Реквизиты"
    children:
      - kind: ПолеВвода
        name: ПолеНомер
        title:
          ru: "Номер"
        data_path: Объект.Номер
        readonly: true
      - kind: ПолеВвода
        name: ПолеДата
        title:
          ru: "Дата"
        data_path: Объект.Дата
        required: true
      - kind: ПолеВвода
        name: ПолеОрганизация
        title:
          ru: "Организация"
        data_path: Объект.Организация
        choice: true
      - kind: ПолеВвода
        name: ПолеСклад
        title:
          ru: "Склад"
        data_path: Объект.Склад
        required: true
        choice: true
      - kind: ПолеВвода
        name: ПолеПричина
        title:
          ru: "Причина"
        data_path: Объект.Причина
        hint: "Причина оприходования (например, излишки инвентаризации)"
  - kind: ГруппаФормы
    name: ГруппаТовары
    title:
      ru: "Товары"
    children:
      - kind: ТабличнаяЧасть
        name: ТабТовары
        title:
          ru: "Товары к оприходованию"
        data_path: Объект.Товары
        auto_sum: true
      - kind: ПолеВвода
        name: ПолеКомментарий
        title:
          ru: "Комментарий"
        data_path: Объект.Комментарий
events:
  ПриОткрытии: ПриОткрытииФормы
  ПередЗаписью: ПередЗаписьюФормы
