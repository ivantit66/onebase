schema: onebase.form/v1
form:
  name: ФормаОбъекта
  kind: object
  entity: РеализацияТоваров
  title:
    ru: "Реализация товаров"
    en: "Goods issue"
    de: "Warenausgang"
  auto_save_settings: true
  vertical_scroll: auto
attributes:
  - name: Объект
    type: DocumentRef.РеализацияТоваров
    save: true
    main: true
commands:
  - name: ПересчитатьКоманда
    title:
      ru: "Пересчитать итоги"
    action: КнопкаПересчитатьНажатие
    picture: stdpic:Refresh
elements:
  - kind: СтраницыФормы
    name: ОсновныеЗакладки
    children:
      - kind: Страница
        name: СтраницаОсновное
        title:
          ru: "Основное"
          en: "General"
        children:
          - kind: ГруппаФормы
            name: ГруппаШапка
            title:
              ru: "Шапка документа"
            children:
              - kind: ПолеВвода
                name: ПолеНомер
                title:
                  ru: "Номер"
                data_path: Объект.Номер
                readonly: true
              - kind: ПолеВвода
                name: ПолеДата
                title:
                  ru: "Дата"
                data_path: Объект.Дата
                required: true
              - kind: ПолеВвода
                name: ПолеОрганизация
                title:
                  ru: "Организация"
                data_path: Объект.Организация
                choice: true
              - kind: ПолеВвода
                name: ПолеПокупатель
                title:
                  ru: "Покупатель"
                data_path: Объект.Покупатель
                required: true
                choice: true
              - kind: ПолеВвода
                name: ПолеСклад
                title:
                  ru: "Склад"
                data_path: Объект.Склад
                required: true
                choice: true
              - kind: ПолеВвода
                name: ПолеСпособУчетаНДС
                title:
                  ru: "НДС"
                data_path: Объект.СпособУчетаНДС
                choice: true
                hint: "ВТомЧисле — НДС включён, Сверху — НДС сверху"
          - kind: ГруппаФормы
            name: ГруппаИтоги
            title:
              ru: "Итоги"
            children:
              - kind: ПолеВвода
                name: ПолеСуммаБезНДС
                title:
                  ru: "Без НДС"
                data_path: Объект.СуммаБезНДС
                readonly: true
              - kind: ПолеВвода
                name: ПолеСуммаНДС
                title:
                  ru: "НДС"
                data_path: Объект.СуммаНДС
                readonly: true
              - kind: ПолеВвода
                name: ПолеСумма
                title:
                  ru: "Всего"
                data_path: Объект.Сумма
                readonly: true
      - kind: Страница
        name: СтраницаТовары
        title:
          ru: "Товары"
        children:
          - kind: ГруппаФормы
            name: ГруппаТабЧасть
            title:
              ru: "Состав отгрузки"
            children:
              - kind: ТабличнаяЧасть
                name: ТабТовары
                title:
                  ru: "Товары"
                data_path: Объект.Товары
                auto_sum: true
              - kind: Кнопка
                name: КнопкаПересчитать
                title:
                  ru: "Пересчитать"
                events:
                  Нажатие: КнопкаПересчитатьНажатие
              - kind: Кнопка
                name: КнопкаОчистить
                title:
                  ru: "Очистить"
                events:
                  Нажатие: КнопкаОчиститьНажатие
          - kind: ПолеВвода
            name: ПолеКомментарий
            title:
              ru: "Комментарий"
            data_path: Объект.Комментарий
events:
  ПриОткрытии: ПриОткрытииФормы
  ПередЗаписью: ПередЗаписьюФормы
  ПриЗаписи: ПриЗаписиФормы
