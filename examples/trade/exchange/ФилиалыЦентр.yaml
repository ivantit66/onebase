name: ФилиалыЦентр
title: Филиалы ↔ Центр
# Правило разрешения конфликта версий при встречной правке одного объекта:
#   by_time          — побеждает позже изменённый (по времени изменения);
#   by_node_priority — побеждает узел с большим priority;
#   hook             — выбор делает обработчик ПриКонфликтеОбмена (фаза 2).
conflict: by_time

# Состав обмена — какие объекты синхронизируются. Формат: <Вид>.<Имя>.
content:
  - Справочник.Номенклатура
  - Справочник.Контрагент
  - Документ.РеализацияТоваров

# Узлы-участники. Код текущего узла базы задаётся отдельно на каждой базе
# командой `onebase exchange init --plan ФилиалыЦентр --node <код>` — в YAML он не
# хранится, потому что конфигурация у всех участников одинаковая.
#
# url — адрес базы узла для онлайн-обмена (`exchange sync`). Необязателен: без
# него доступен только файловый обмен (dump/load). Поддерживает ${env:VAR}, чтобы
# адреса задавались на деплое, а не в git.
nodes:
  - { code: center, name: Центральная база, priority: 10, url: "${env:OB_EXCHANGE_CENTER_URL}" }
  - { code: fil01,  name: Филиал №1,        priority: 1,  url: "${env:OB_EXCHANGE_FIL01_URL}" }
