name: РасходнаяНакладная
document: РеализацияТоваров
columns:
    - width: 40px
    - {}
    - {}
    - {}
    - {}
    - {}
areas:
    - name: Заголовок
      rows:
        - cells:
            - text: Расходная накладная № {{Номер}} от {{Дата | date}}
              bold: true
              align: center
              fontSize: 14
              colspan: 6
    - name: Шапка
      rows:
        - cells:
            - text: 'Организация: {{Организация.Наименование}}'
              colspan: 6
        - cells:
            - colspan: 6
        - cells:
            - text: 'Покупатель: {{Покупатель.Наименование}}'
              colspan: 6
        - cells:
            - colspan: 6
        - cells:
            - text: 'Склад: {{Склад.Наименование}}'
              colspan: 6
        - cells:
            - colspan: 6
    - name: ШапкаТаблицы
      rows:
        - cells:
            - text: №
              bold: true
              border: all
            - text: Номенклатура
              bold: true
              border: all
            - text: Кол-во
              bold: true
              align: right
              border: all
            - text: Цена
              bold: true
              align: right
              border: all
            - text: Сумма
              bold: true
              align: right
              border: all
            - text: НДС
              bold: true
              align: right
              border: all
    - name: Строка
      rows:
        - cells:
            - parameter: Кол0
              border: all
            - parameter: Кол1
              border: all
            - parameter: Кол2
              align: right
              border: all
            - parameter: Кол3
              align: right
              border: all
            - parameter: Кол4
              align: right
              border: all
            - parameter: Кол5
              align: right
              border: all
    - name: Итоги
      rows:
        - cells:
            - border: all
            - border: all
            - border: all
            - border: all
            - text: 'Итого: {{Итог.Товары.Сумма | number:2}}'
              bold: true
              align: right
              border: all
            - text: 'НДС: {{Итог.Товары.НДС | number:2}}'
              bold: true
              align: right
              border: all
    - name: Подвал
      rows:
        - cells:
            - colspan: 6
              borders:
                bottom: thin
        - cells:
            - colspan: 6
        - cells:
            - text: 'Всего: {{СуммаДокумента | number:2}} руб., в т.ч. НДС: {{НДС | number:2}} руб.'
              colspan: 6
        - cells:
            - colspan: 6
        - cells:
            - colspan: 6
              borders:
                bottom: thin
        - cells:
            - colspan: 6
        - cells:
            - text: 'Отпустил: _________________________ Получил: _________________________'
              colspan: 6
        - cells:
            - colspan: 6
binding:
    sequence:
        - Заголовок
        - Шапка
        - ШапкаТаблицы
        - Строка
        - Итоги
        - Подвал
    repeat:
        - area: Строка
          source: Товары
          parameters:
            Кол0: '@row'
            Кол1: Номенклатура.Наименование
            Кол2: Количество
            Кол3: Цена | number:2
            Кол4: Сумма | number:2
            Кол5: НДС | number:2
