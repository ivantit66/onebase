name: Супервизор
description: Руководитель КЦ — управляет правилами валидации (публикация/откат) сверх прав оператора
# План 89 (пробел G2, CC-RULE-005): публиковать и откатывать версии правил может
# только уполномоченная роль. Супервизор проводит документ ПубликацияПравила (op
# post) и правит справочник правил; обычный оператор — нет (см. roles/Оператор.yaml).
permissions:
  catalogs:
    Клиент: [read, write, disclose]
    Оператор: [read]
    Очередь: [read]
    ПравилаВалидации: [read, write]
  documents:
    Звонок: [read, write]
    Заявка: [read, write]
    # Опубликованные версии неизменяемы: отмена проведения запрещена и правом,
    # и хуком документа. Откат — только новая публикация с более поздней датой.
    ПубликацияПравила: [read, write, post]
  inforegs:
    СтатусОператора: [read, write]
    ДействующиеПравила: [read]
  processors:
    ЗаполнитьДемоданные: [run]
    ТестВходящийЗвонок: [run]
    ЗаполнитьПравилаВалидации: [run]
