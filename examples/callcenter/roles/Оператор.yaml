name: Оператор
description: Доступ к панели телефонии, клиентам и журналу звонков
permissions:
  catalogs:
    Клиент: [read, write, disclose]
    Оператор: [read]
    Очередь: [read]
  documents:
    Звонок: [read, write]
    # План 89: оператор создаёт заявки (сработают правила валидации), но НЕ может
    # публиковать/менять правила — документа ПубликацияПравила в роли нет, поэтому
    # проведение публикации ему запрещено (403). Управление правилами — у Супервизора.
    Заявка: [read, write]
    # План 85 (G3): оператор видит свои задачи (инициированные/адресованные/взятые им)
    Задача: [read, write]
  # «Мои задачи»: оператор видит и изменяет только задачи, где он
  # адресат, исполнитель или инициатор (CC-FR-P05/P06: чужие задачи не видны и недоступны для записи).
  row_access:
    documents:
      Задача:
        read:
          any:
            - { field: Адресат, op: eq, value: { user: login } }
            - { field: Исполнитель, op: eq, value: { user: login } }
            - { field: Инициатор, op: eq, value: { user: login } }
        write:
          any:
            - { field: Адресат, op: eq, value: { user: login } }
            - { field: Исполнитель, op: eq, value: { user: login } }
            - { field: Инициатор, op: eq, value: { user: login } }
  inforegs:
    СтатусОператора: [read, write]
  processors:
    ЗаполнитьДемоданные: [run]
    ТестВходящийЗвонок: [run]
  # План 88 — маскирование ПДн клиента: оператор КЦ видит телефон/почту частично,
  # полное значение раскрывается по кнопке «Раскрыть» под аудитом (право disclose,
  # CC-SEC-003/004). Роль без field_access видела бы значения целиком.
  field_access:
    catalogs:
      Клиент:
        Телефон: { read: mask_tail, keep: 4 }
        МобильныйТелефон: { read: mask_tail, keep: 4 }
        Email: { read: mask_all }
