name: ПравилаВалидации
title: Правила валидации
# Реестр правил как данных (план 89, прикладной паттерн G2). Стабильная часть
# правила: что и где проверять. Действующая версия (уровень + текст + период
# действия) хранится отдельно — в периодическом регистре ДействующиеПравила,
# чтобы историю можно было версионировать и датировать (CC-RULE-002/003).
hierarchical: false
fields:
  - name: Наименование
    type: string
  - name: Код
    type: string
    label: Код правила (REQ-STREET, WARN-COMMENT, …)
  - name: ОбъектМетаданных
    type: string
    label: Проверяемый объект (имя документа/справочника)
  - name: Поле
    type: string
    label: Проверяемое поле объекта
  - name: ВидПроверки
    type: enum:ВидПроверки
  - name: Владелец
    type: string
    label: Владелец правила (роль/ответственный)
