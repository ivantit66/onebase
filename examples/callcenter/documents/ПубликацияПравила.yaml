name: ПубликацияПравила
title: Публикация правила
# Публикация версии правила. Черновик = непроведённый документ; публикация =
# проведение (движение в регистр ДействующиеПравила). Откат = новая публикация
# с прежними значениями и более поздней датой — СрезПоследних выберет её как
# активную, а прежние версии останутся в истории (CC-RULE-007). Проведение
# доступно только уполномоченной роли (CC-RULE-005) — см. roles/Супервизор.yaml.
posting: true
numerator:
  prefix: "ПУБ-"
  length: 6
  period: year
fields:
  - name: Номер
    type: string
  - name: Дата
    type: date
    label: Дата вступления версии в силу
  - name: Правило
    type: reference:ПравилаВалидации
  - name: Уровень
    type: enum:УровеньПроверки
  - name: Текст
    type: string
    label: Текст сообщения версии
  - name: Статус
    type: enum:СтатусПравила
  - name: Основание
    type: string
    label: Основание/решение (приказ, тикет)
