name: Задача
title: Задача
# Прикладной паттерн G3 (план 85, заход 0): адресованная единица работы с
# состоянием, сроком, предметом и историей. Маршрут ведёт модуль Согласование
# (src/Согласование.module.os). «Мои задачи» = список Задач под row_access
# (видны только адресованные/назначенные мне) — см. roles/*. Атомарный захват
# неназначенной задачи одним исполнителем даёт платформа (optimistic_lock).
numerator:
  prefix: "ЗД-"
  length: 6
  period: year
fields:
  - name: Номер
    type: string
  - name: Дата
    type: date
  - name: Тип
    type: string
    label: Тип задачи (Согласование, Доработка, …)
  - name: Инициатор
    type: string
    label: Логин инициатора
  - name: Основание
    type: reference:Заявка
    label: Предмет задачи (документ-основание)
  - name: Адресат
    type: string
    label: Логин адресата (кому направлена)
  - name: Исполнитель
    type: string
    label: Логин исполнителя (кто взял/выполнил)
  - name: Срок
    type: date
  - name: Состояние
    type: enum:СостояниеЗадачи
  - name: Результат
    type: enum:РезультатСогласования
  - name: Комментарий
    type: string
