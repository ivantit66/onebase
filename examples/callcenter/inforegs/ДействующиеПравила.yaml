name: ДействующиеПравила
title: Действующие правила (версии)
# Периодический регистр = примитив эффективного датирования (план 02). Каждая
# публикация правила — строка (period=дата вступления, Правило). СрезПоследних(&Дата)
# в хуке валидации выбирает версию, активную на бизнес-дату документа. История
# неизменяема: откат/переиздание добавляют строки, не переписывая старые
# (CC-RULE-003/007). Записывается движением документа ПубликацияПравила.
periodic: true
dimensions:
  - name: Правило
    type: reference:ПравилаВалидации
resources:
  - name: Уровень
    type: enum:УровеньПроверки
  - name: Текст
    type: string
    label: Текст сообщения версии
  - name: Статус
    type: enum:СтатусПравила
  - name: Опубликовал
    type: string
  - name: Основание
    type: string
    label: Основание/решение (приказ, тикет)
