name: АктСписания
document: Списание
columns:
    - width: 36px
    - {}
    - width: 80px
areas:
    - name: Заголовок
      rows:
        - cells:
            - text: Акт списания № {{Номер}} от {{Дата | date}}
              bold: true
              align: center
              fontSize: 14
              colspan: 3
    - name: Шапка
      rows:
        - cells:
            - text: Акт списания товарно-материальных ценностей
              bold: true
              fontSize: 14
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: № {{Номер}} &nbsp;&nbsp; от {{Дата | date}}
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - colspan: 3
              borders:
                bottom: thin
        - cells:
            - colspan: 3
    - name: ШапкаТаблицы
      rows:
        - cells:
            - text: №
              bold: true
              align: center
              border: all
            - text: Наименование ТМЦ
              bold: true
              border: all
            - text: Кол-во
              bold: true
              align: right
              border: all
    - name: Строка
      rows:
        - cells:
            - parameter: Кол0
              align: center
              border: all
            - parameter: Кол1
              border: all
            - parameter: Кол2
              align: right
              border: all
    - name: Итоги
      rows:
        - cells:
            - border: all
            - border: all
            - text: 'Итого: {{Итог.Товары.Количество | number:0}}'
              bold: true
              align: right
              border: all
    - name: Подвал
      rows:
        - cells:
            - colspan: 3
              borders:
                bottom: thin
        - cells:
            - colspan: 3
        - cells:
            - text: 'Основание списания: ______________________________________________________'
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 'Комиссия:'
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 1. _________________________________ /________________________/
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 2. _________________________________ /________________________/
              colspan: 3
        - cells:
            - colspan: 3
        - cells:
            - text: 3. _________________________________ /________________________/
              colspan: 3
        - cells:
            - colspan: 3
binding:
    sequence:
        - Заголовок
        - Шапка
        - ШапкаТаблицы
        - Строка
        - Итоги
        - Подвал
    repeat:
        - area: Строка
          source: Товары
          parameters:
            Кол0: '@row'
            Кол1: Номенклатура
            Кол2: Количество | number:0
